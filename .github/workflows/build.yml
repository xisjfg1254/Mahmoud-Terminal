name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flet requests pandas ta websocket-client
      - name: Build APK
        run: |
          yes "y" | flutter doctor --android-licenses || true
          flet build apk --project "MahmoudTerminal" --module-name sun.py --yes
      
      # خطوة إضافية للتأكد من وجود الملف (Debug)
      - name: List built files
        run: ls -R build/apk/ || echo "Folder not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/apk/*.apk
