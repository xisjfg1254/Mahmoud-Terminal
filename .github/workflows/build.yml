name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install flet
          # التأكد من وجود ملف requirements.txt قبل التثبيت
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build APK
        # أضفنا --yes هنا لتجاوز موافقة تثبيت Flutter تلقائياً
        run: |
          flet build apk --yes
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/apk/*.apk
