name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      # هذه الخطوة ستخبرنا أين يقع الملف بالضبط، إذا فشلت، فالمشكلة في المسار
      - name: Debug - List Files
        run: ls -la
      
      # هذه الخطوة ستحاول البناء مع تحديد الملف يدوياً
      - name: Build APK
        run: |
          flet build apk --module-name main.py --yes
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: "**/*.apk"
