name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flet requests pandas ta websocket-client
      - name: Build APK
        run: |
          # الموافقة التلقائية على تراخيص أندرويد
          yes "y" | flutter doctor --android-licenses || true
          # بناء التطبيق مع تحديد ملف sun.py كملف أساسي
          flet build apk --project "MahmoudTerminal" --module-name sun.py --yes
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/apk/app-release.apk
