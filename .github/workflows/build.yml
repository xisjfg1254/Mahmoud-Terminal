name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flet requests pandas ta websocket-client
      - name: Build APK
        run: |
          flet build apk --project "MahmoudTerminal"
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-apk
          path: build/apk/app-release.apk
          
