name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build APK
        run: |
          flet build apk --yes
      
      # هذه الخطوة ستطبع لنا مكان الملف بالضبط في السجلات (Logs)
      - name: Find and Print APK path
        run: |
          find . -name "*.apk"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          # الرمز ** يعني ابحث في كل المجلدات الفرعية
          path: "**/*.apk"
